<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
#bulb{
    border-radius: 50%;
    height:400px;
    width:400px;
    margin-left:550px;

    border: 2px solid black;

}

input{
      margin-left:200px;
      cursor: pointer;
      border-radius: 10px;
      background-color: rgb(97, 97, 189);
      width:100px;
      height:40px;

    }
    </style>
    <script>
        function colorhandler(color){
            console.log("hi ",color);

           const bulb= document.getElementById('bulb');
           console.log(bulb);
           bulb.style.backgroundColor=color;
           bulb.innerText=color;
           

        }
    </script>
</head>
<body>
    
    <div id="bulb">

    </div>
    <input type="button"value="red"onclick="colorhandler(value)">
    <input type="button"value="blue"onclick="colorhandler(value)">
    <input type="button"value="green"onclick="colorhandler(value)">
    <input type="button"value="yellow"onclick="colorhandler(value)">
</body>
</html>
